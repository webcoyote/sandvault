name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build
        run: ./sv -vvv --ios --browser build

      - name: Pre-boot iOS simulator
        # Boot a simulator now and export its UDID via SV_IOS_REUSE_UDID so the
        # iOS test suite reuses it instead of paying create+boot inside
        # tests/tests. Returns as soon as `simctl boot` accepts the request;
        # the simulator finishes booting in the background during SandVault
        # Tests. The bridge picks up via its own `bootstatus -b` call.
        run: .github/scripts/preboot-ios-simulator

      - name: SandVault Tests
        env:
          VERBOSE: 1
        run: ./scripts/tests

      - name: Swift/Xcode Tests
        env:
          XCODE_DESTINATION: platform=macOS,arch=arm64
          VERBOSE: 1
        run: ./tests/tests

      - name: Clean up iOS simulator
        if: always()
        run: .github/scripts/cleanup-ios-simulator

  tag-version:
    name: Tag Version
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}

      - name: Tag version if updated
        run: .github/scripts/tag-version
